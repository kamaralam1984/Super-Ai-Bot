<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chat</title>
<style>
  :root { --accent: #e8a838; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { display: flex; flex-direction: column; background: #fff; color: #1a1a1a; }
  #header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--accent); color: #fff; flex-shrink: 0; }
  #header h1 { font-size: 15px; font-weight: 600; margin: 0; }
  #closeBtn { background: none; border: none; color: #fff; cursor: pointer; padding: 4px; opacity: .85; font-size: 16px; line-height: 1; }
  #closeBtn:hover { opacity: 1; }
  #messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 82%; padding: 9px 12px; border-radius: 14px; font-size: 13.5px; line-height: 1.45; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: #f1f2f4; color: #1a1a1a; border-bottom-left-radius: 4px; }
  .msg.system { align-self: center; background: transparent; color: #888; font-size: 12px; text-align: center; }
  #typing { align-self: flex-start; padding: 9px 12px; }
  #typing span { display: inline-block; width: 6px; height: 6px; margin: 0 1px; border-radius: 50%; background: #aaa; animation: kvl-blink 1.2s infinite; }
  #typing span:nth-child(2) { animation-delay: .2s; }
  #typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes kvl-blink { 0%, 80%, 100% { opacity: .3; } 40% { opacity: 1; } }
  #chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 14px 8px; flex-shrink: 0; }
  .chip { border: 1px solid #ddd; background: #fff; border-radius: 999px; padding: 5px 11px; font-size: 12px; cursor: pointer; color: #333; }
  .chip:hover { background: #f6f6f6; }
  #inputRow { display: flex; gap: 8px; padding: 10px; border-top: 1px solid #eee; flex-shrink: 0; }
  #inputRow input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 9px 14px; font-size: 13.5px; outline: none; min-width: 0; }
  #inputRow input:focus { border-color: var(--accent); }
  #inputRow button { background: var(--accent); border: none; color: #fff; border-radius: 50%; width: 38px; height: 38px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  #inputRow button:disabled { opacity: .5; cursor: default; }
  #inputRow button svg { width: 17px; height: 17px; fill: #fff; }
  #poweredBy { text-align: center; font-size: 10px; color: #bbb; padding: 0 0 8px; flex-shrink: 0; }
</style>
</head>
<body>
  <div id="header">
    <h1 id="businessName">Chat</h1>
    <button id="closeBtn" type="button" aria-label="Close" title="Close">&#10005;</button>
  </div>
  <div id="messages"></div>
  <div id="chips"></div>
  <div id="inputRow">
    <input id="input" type="text" placeholder="Type a message…" maxlength="4000" autocomplete="off" disabled />
    <button id="sendBtn" type="button" aria-label="Send" disabled>
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div id="poweredBy">Powered by KVL Super AI Chatbot</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
  (function () {
    "use strict";
    var qs = new URLSearchParams(location.search);
    var colorParam = qs.get("color");
    var greetingParam = qs.get("greeting");
    if (colorParam) document.documentElement.style.setProperty("--accent", colorParam);

    var messagesEl = document.getElementById("messages");
    var chipsEl = document.getElementById("chips");
    var inputEl = document.getElementById("input");
    var sendBtn = document.getElementById("sendBtn");
    var businessNameEl = document.getElementById("businessName");
    var closeBtn = document.getElementById("closeBtn");

    closeBtn.addEventListener("click", function () {
      window.parent.postMessage({ type: "kvl-widget-close" }, "*");
    });

    var STORAGE_KEY = "kvl_widget_visitor_fingerprint";
    function getFingerprint() {
      try { return localStorage.getItem(STORAGE_KEY) || undefined; } catch (e) { return undefined; }
    }
    function setFingerprint(fp) {
      try { localStorage.setItem(STORAGE_KEY, fp); } catch (e) { /* ignore (private browsing, etc.) */ }
    }

    function addMessage(role, text) {
      var el = document.createElement("div");
      el.className = "msg " + role;
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    function showChips(items, onPick) {
      chipsEl.innerHTML = "";
      (items || []).forEach(function (label) {
        var chip = document.createElement("button");
        chip.type = "button";
        chip.className = "chip";
        chip.textContent = label;
        chip.addEventListener("click", function () { onPick(label); });
        chipsEl.appendChild(chip);
      });
    }

    var typingEl = null;
    function showTyping() {
      if (typingEl) return;
      typingEl = document.createElement("div");
      typingEl.id = "typing";
      typingEl.innerHTML = "<span></span><span></span><span></span>";
      messagesEl.appendChild(typingEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    function hideTyping() {
      if (typingEl) { typingEl.remove(); typingEl = null; }
    }

    var installationId, businessName, conversationId, socket, streamingEl = null;

    function sendMessage(rawText) {
      var text = (rawText || "").trim();
      if (!text || !conversationId) return;
      addMessage("user", text);
      inputEl.value = "";
      chipsEl.innerHTML = "";
      streamingEl = null;
      showTyping();
      socket.emit("chat:message", {
        installationId: installationId,
        conversationId: conversationId,
        message: text,
        businessName: businessName,
      });
    }

    sendBtn.addEventListener("click", function () { sendMessage(inputEl.value); });
    inputEl.addEventListener("keydown", function (e) {
      if (e.key === "Enter") sendMessage(inputEl.value);
    });

    fetch("/api/chat/config")
      .then(function (r) { return r.json(); })
      .then(function (res) {
        if (!res.success) throw new Error("config unavailable");
        installationId = res.data.installationId;
        businessName = res.data.businessName;
        businessNameEl.textContent = businessName;

        socket = window.io();
        socket.on("connect", function () {
          socket.emit("chat:start", {
            installationId: installationId,
            visitorFingerprint: getFingerprint(),
            preferredLanguage: navigator.language,
          });
        });

        socket.on("chat:started", function (data) {
          setFingerprint(data.visitorFingerprint);
          conversationId = data.conversationId;
          inputEl.disabled = false;
          sendBtn.disabled = false;
          inputEl.focus();
          if (data.isNewConversation) {
            addMessage("bot", greetingParam || ("Hi! I'm " + businessName + "'s AI assistant. How can I help you today?"));
          } else {
            fetch("/api/chat/conversations/" + encodeURIComponent(data.conversationId) + "/messages")
              .then(function (r) { return r.json(); })
              .then(function (res2) {
                if (res2.success && Array.isArray(res2.data)) {
                  res2.data.forEach(function (m) {
                    addMessage(m.role === "USER" ? "user" : "bot", m.content);
                  });
                }
              })
              .catch(function () { /* history is a nice-to-have, not fatal */ });
          }
        });

        socket.on("chat:thinking", function () { showTyping(); });

        socket.on("chat:delta", function (data) {
          hideTyping();
          if (!streamingEl) streamingEl = addMessage("bot", "");
          streamingEl.textContent += data.delta;
          messagesEl.scrollTop = messagesEl.scrollHeight;
        });

        socket.on("chat:complete", function (result) {
          hideTyping();
          if (streamingEl) {
            streamingEl.textContent = result.content;
            streamingEl = null;
          } else {
            addMessage("bot", result.content);
          }
          if (result.escalated) {
            addMessage("system", "This conversation has been escalated to a human — someone will follow up.");
          }
          showChips(result.suggestedQuestions, function (q) { sendMessage(q); });
        });

        socket.on("chat:error", function (data) {
          hideTyping();
          addMessage("system", (data && data.message) || "Something went wrong. Please try again.");
        });
      })
      .catch(function () {
        businessNameEl.textContent = "Chat unavailable";
        addMessage("system", "Chat is not available right now. Please try again later.");
      });
  })();
  </script>
</body>
</html>
