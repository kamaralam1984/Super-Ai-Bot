# Shared location/proxy logic, included by both http-only.conf.template and
# https.conf.template — kept in one place so the two TLS modes can never
# drift apart on what actually gets proxied where. Not itself a top-level
# conf.d file nginx auto-loads (no `server {}` wrapper), included
# explicitly by the two templates above.

# Security headers — applied to every response from this vhost, backend
# or frontend alike. CSP is deliberately not set here: the SPA's own
# script/style needs (inline styles from CSS-in-JS, etc.) are the
# frontend's concern, and a wrong CSP set at the edge is worse than none
# (silently breaks the app) — see docs/SECURITY.md for the frontend's own
# CSP posture.
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# WebSocket (Socket.IO) — chat streaming (Phase 8) and the installer
# wizard's live progress both depend on this upgrading correctly.
location /socket.io/ {
    proxy_pass http://kvl_backend;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    include /etc/nginx/includes/kvl-proxy-headers.conf;
    proxy_read_timeout 3600s; # long-lived streaming connection, not a slow-request bug
    proxy_send_timeout 3600s;
}

# The installer surface (system probing, secret generation, DB
# init/rollback) gets the tighter rate-limit zone — edge-level
# brute-force/abuse resistance ahead of the application-level rate
# limiters every other admin API router already has (knowledge.routes.ts,
# training.routes.ts, etc., which this general /api/ zone below covers).
location /api/install/ {
    limit_req zone=kvl_auth burst=10 nodelay;
    proxy_pass http://kvl_backend;
    include /etc/nginx/includes/kvl-proxy-headers.conf;
}

location /api/ {
    limit_req zone=kvl_api burst=40 nodelay;
    proxy_pass http://kvl_backend;
    include /etc/nginx/includes/kvl-proxy-headers.conf;
}

# Public embeddable chat widget (Phase 12, backend/src/routes/widget.routes.ts)
# — served by the backend, not the frontend SPA container, so it needs its
# own location instead of falling through to the catch-all `location /`
# below. `/widget.js` is just a script file (X-Frame-Options never applies
# to <script src>, so no header override needed). `/widget` is the actual
# chat page and is the one page in this whole product meant to be iframed
# from an arbitrary third-party (client) domain — `add_header` does NOT
# inherit from the server block once a location block sets any of its own,
# so this repeats the safe headers from the top of this file and
# deliberately omits X-Frame-Options in favor of a permissive
# frame-ancestors CSP.
location = /widget.js {
    proxy_pass http://kvl_backend;
    include /etc/nginx/includes/kvl-proxy-headers.conf;
}

location = /widget {
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "frame-ancestors *" always;
    proxy_pass http://kvl_backend;
    include /etc/nginx/includes/kvl-proxy-headers.conf;
}

location = /health {
    proxy_pass http://kvl_backend;
    include /etc/nginx/includes/kvl-proxy-headers.conf;
}

# Everything else — the SPA. Cache hashed static assets at the edge too
# (in addition to the frontend container's own headers — belt and
# braces, and it means a repeat asset request never even reaches the
# frontend container).
location / {
    proxy_cache kvl_cache;
    proxy_cache_valid 200 5m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
    proxy_pass http://kvl_frontend;
    include /etc/nginx/includes/kvl-proxy-headers.conf;
}
