# Serves the built SPA only — compression/caching/security headers/rate
# limiting for the public-facing edge live in deploy/nginx/ (the reverse
# proxy in front of this container), not duplicated here. This server
# block's only real job beyond "serve static files" is the SPA fallback
# (client-side routing) and not caching index.html forever (it must be
# re-fetched on every deploy so browsers pick up the new asset hashes).

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Vite's build output hashes every JS/CSS filename, so these can be
    # cached aggressively — a stale cached asset is impossible by
    # construction (a new deploy produces new filenames, referenced by a
    # freshly-fetched, never-cached index.html above).
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
