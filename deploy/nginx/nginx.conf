user nginx;
worker_processes auto;
worker_rlimit_nofile 8192;

pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off; # don't advertise the nginx version to clients

    client_max_body_size 25m; # matches backend/src/app.ts's express.json({ limit: "1mb" }) plus headroom for document uploads elsewhere in the pipeline

    # Compression — real content types this app actually serves (JSON API
    # responses, the SPA's JS/CSS bundle), not a blanket "compress
    # everything" that wastes CPU on already-compressed images.
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml image/svg+xml font/woff2;

    # Rate limiting zones — one for the general API surface, a tighter one
    # for auth-adjacent endpoints. Applied per server block in conf.d/, not
    # here, so a future second vhost can opt out/tune independently.
    limit_req_zone $binary_remote_addr zone=kvl_api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=kvl_auth:10m rate=5r/s;
    limit_req_status 429;

    # Proxy caching for cacheable backend GETs (the chat widget's static
    # config/branding fetches, health checks) — deliberately small and
    # short-lived; nothing here caches API responses that carry
    # per-visitor or per-conversation state.
    proxy_cache_path /var/cache/nginx/proxy levels=1:2 keys_zone=kvl_cache:10m max_size=200m inactive=10m use_temp_path=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    include /etc/nginx/conf.d/*.conf;
}
