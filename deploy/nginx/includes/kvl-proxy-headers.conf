# Shared proxy_set_header block, included by every proxied location in
# kvl-locations.conf — one place to get "the backend sees the real client
# IP and the original scheme" right, instead of repeating (and risking
# drift on) these five lines per location block.
proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;
proxy_connect_timeout 10s;
proxy_read_timeout 60s;
